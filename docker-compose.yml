services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - spark-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s  # ChromaDB needs ~30s to initialise on first start

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      API_URL: http://localhost:8000   # override with Railway URL in production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - spark-net
    restart: unless-stopped

networks:
  spark-net:
    driver: bridge
